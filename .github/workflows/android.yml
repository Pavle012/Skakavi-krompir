name: Build Android APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            python3 \
            python3-pip \
            libtool \
            m4 \
            autoconf \
            automake \
            autoconf-archive \
            ant \
            openjdk-17-jdk \
            zip \
            unzip \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libffi-dev \
            libssl-dev

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}

      - name: Install Buildozer
        run: |
          pip install --user buildozer==1.5.0
          pip install --user Cython==3.0.10

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          
          # Fix for LT_SYS_SYMBOL_USCORE macro missing in some environments
          mkdir -p /tmp/aclocal
          cat > /tmp/aclocal/lt_sys_symbol_uscore.m4 << 'EOF'
          dnl LT_SYS_SYMBOL_USCORE
          dnl Discovered by configure, passed to source
          AC_DEFUN([LT_SYS_SYMBOL_USCORE],
          [AC_REQUIRE([AC_CANONICAL_HOST])
          AC_CACHE_CHECK([whether the symbol leading character is an underscore],
            [lt_cv_sys_symbol_underscore],
            [lt_cv_sys_symbol_underscore=no
            case $host in
             *-*-cygwin*|*-*-mingw*)
              lt_cv_sys_symbol_underscore=yes
              ;;
             esac
          ])
          SYS_SYMBOL_UNDERSCORE=$lt_cv_sys_symbol_underscore
          AC_SUBST([SYS_SYMBOL_UNDERSCORE])
          ]) dnl LT_SYS_SYMBOL_USCORE
          EOF
          export ACLOCAL_PATH="/tmp/aclocal:${ACLOCAL_PATH:-}"
          
          # Prevent Kivy from picking up host include paths via pkg-config
          export KIVY_NO_PKG_CONFIG=1
          export PKG_CONFIG_PATH=""
          
          buildozer -v android debug
        env:
          ACCEPT_SDK_LICENSE: "yes"
          NDK_API: "21"
          ANDROID_API: "33"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Skakavi-Krompir-Android-Debug
          path: bin/*.apk

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: Skakavi-Krompir-Android-Debug
          path: bin

      - name: Get tag message
        id: get_tag_message
        run: echo "message=$(git tag -l --format='%(contents:subject)' ${{ github.ref }})" >> $GITHUB_OUTPUT

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.get_tag_message.outputs.message }}
          files: bin/*.apk
