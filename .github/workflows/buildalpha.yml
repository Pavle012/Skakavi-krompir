name: Build alpha

on: [push, workflow_dispatch]

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: x64
          - os: ubuntu-latest
            arch: x64
          - os: ubuntu-latest
            arch: aarch64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        if: matrix.arch != 'aarch64'
        with:
          python-version: '3.11'

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache-${{ hashFiles('requirements.txt') }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/Nuitka
            C:\Users\runneradmin\AppData\Local\pip\Cache
            C:\Users\runneradmin\AppData\Local\Nuitka\Cache
          key: ${{ runner.os }}-nuitka-${{ hashFiles('requirements.txt') }}

      - run: pip install -r requirements.txt
        if: matrix.arch != 'aarch64'

      - name: Build with Nuitka on Windows
        if: runner.os == 'Windows'
        run: |
          python -m nuitka --onefile --jobs=4 --python-flag=no_docstrings --windows-icon-from-ico=assets/potato.ico --include-data-dir=assets=assets --assume-yes-for-downloads --enable-plugin=tk-inter --lto=no original/main.py
          if (!(Test-Path dist)) { New-Item -ItemType Directory -Path dist }
          Move-Item main.exe dist/game.exe

      - name: Build with Nuitka on Linux (x64)
        if: runner.os == 'Linux' && matrix.arch == 'x64'
        run: |
          ARCH=$(dpkg --print-architecture)
          python -m nuitka --onefile --jobs=$(nproc) --python-flag=no_docstrings --include-data-dir=assets=assets --enable-plugin=tk-inter --static-libpython=yes original/main.py
          mkdir -p dist
          mv main.bin dist/game-${ARCH}

      - name: Create Swap Space for ARM64
        if: runner.os == 'Linux' && matrix.arch == 'aarch64'
        run: |
          sudo swapoff /swapfile || true
          sudo rm -f /swapfile
          sudo dd if=/dev/zero of=/swapfile bs=1M count=10240
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Build for ARM64 (Linux)
        if: runner.os == 'Linux' && matrix.arch == 'aarch64'
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu22.04
          githubToken: ${{ github.token }}
          setup: |
            mkdir -p "${PWD}/dist"
          dockerRunArgs: |
            --volume "${PWD}:/workspace"
          shell: /bin/sh
          install: |
            apt-get update
            apt-get install -y python3 python3-pip python3-tk ccache binutils git patchelf clang
          run: |
            export CC=clang
            export CXX=clang++
            pip3 install -r requirements.txt
            ARCH=$(dpkg --print-architecture)
            python3 -m nuitka --clang --onefile --jobs=1 --python-flag=no_docstrings --include-data-dir=assets=assets --enable-plugin=tk-inter --static-libpython=yes --lto=no original/main.py
            mkdir -p dist
            mv main.bin dist/game-${ARCH}
            
            VERSION="0.0.0-alpha-$(git rev-parse --short HEAD)"
            APP_NAME="Skakavi Krompir (Alpha)"
            APP_ID="skakavi-krompir-alpha"
            DEBIAN_PACKAGE_DIR="debian_package"
            
            mkdir -p ${DEBIAN_PACKAGE_DIR}/DEBIAN
            mkdir -p ${DEBIAN_PACKAGE_DIR}/usr/local/bin
            mkdir -p ${DEBIAN_PACKAGE_DIR}/usr/share/applications
            mkdir -p ${DEBIAN_PACKAGE_DIR}/usr/share/pixmaps
            cp dist/game-${ARCH} ${DEBIAN_PACKAGE_DIR}/usr/local/bin/${APP_ID}
            cat <<EOF > ${DEBIAN_PACKAGE_DIR}/DEBIAN/control
            Package: ${APP_ID}
            Version: ${VERSION}
            Architecture: ${ARCH}
            Maintainer: user <user@example.com>
            Description: A Flappy Bird-like game (Alpha build).
            Depends: libc6 (>= 2.35)
            EOF
            cat <<EOF > ${DEBIAN_PACKAGE_DIR}/usr/share/applications/${APP_ID}.desktop
            [Desktop Entry]
            Name=${APP_NAME}
            Exec=/usr/local/bin/${APP_ID}
            Icon=/usr/share/pixmaps/skakavi-krompir.png
            Type=Application
            Categories=Game;
            EOF
            cp assets/potato.png ${DEBIAN_PACKAGE_DIR}/usr/share/pixmaps/skakavi-krompir.png
            dpkg-deb --build ${DEBIAN_PACKAGE_DIR} dist/${APP_ID}_${VERSION}_${ARCH}.deb

      - name: Create .deb package on Linux (x64)
        if: runner.os == 'Linux' && matrix.arch == 'x64'
        run: |
          VERSION="0.0.0-alpha-$(git rev-parse --short HEAD)"
          APP_NAME="Skakavi Krompir (Alpha)"
          APP_ID="skakavi-krompir-alpha"
          DEBIAN_PACKAGE_DIR="debian_package"
          ARCH=$(dpkg --print-architecture)
          
          # Create directory structure
          mkdir -p ${DEBIAN_PACKAGE_DIR}/DEBIAN
          mkdir -p ${DEBIAN_PACKAGE_DIR}/usr/local/bin
          mkdir -p ${DEBIAN_PACKAGE_DIR}/usr/share/applications
          mkdir -p ${DEBIAN_PACKAGE_DIR}/usr/share/pixmaps

          # Copy executable
          cp dist/game-${ARCH} ${DEBIAN_PACKAGE_DIR}/usr/local/bin/${APP_ID}

          # Create control file
          cat <<EOF > ${DEBIAN_PACKAGE_DIR}/DEBIAN/control
          Package: ${APP_ID}
          Version: ${VERSION}
          Architecture: ${ARCH}
          Maintainer: user <user@example.com>
          Description: A Flappy Bird-like game (Alpha build).
           Skakavi Krompir is a simple game where you control a potato and try to avoid obstacles.
          Depends: libc6 (>= 2.35)
          EOF

          # Create desktop entry
          cat <<EOF > ${DEBIAN_PACKAGE_DIR}/usr/share/applications/${APP_ID}.desktop
          [Desktop Entry]
          Name=${APP_NAME}
          Exec=/usr/local/bin/${APP_ID}
          Icon=/usr/share/pixmaps/skakavi-krompir.png
          Type=Application
          Categories=Game;
          EOF

          # Copy icon
          cp assets/potato.png ${DEBIAN_PACKAGE_DIR}/usr/share/pixmaps/skakavi-krompir.png

          # Build the .deb package. Output directly to dist folder.
          dpkg-deb --build ${DEBIAN_PACKAGE_DIR} dist/${APP_ID}_${VERSION}_${ARCH}.deb

      - name: Create Flatpak package on Linux (x64)
        if: runner.os == 'Linux' && matrix.arch == 'x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.freedesktop.Platform//25.08 org.freedesktop.Sdk//25.08
          
          APP_ID="io.github.skakavikrompir"
          VERSION="0.0.0-alpha-$(git rev-parse --short HEAD)"
          ARCH=$(dpkg --print-architecture)
          
          python -c "from PIL import Image; Image.open('assets/potato.png').resize((256, 256)).save('potato-256.png')"
          
          cat <<FLATPAK_EOF > ${APP_ID}.yml
          app-id: ${APP_ID}
          runtime: org.freedesktop.Platform
          runtime-version: '25.08'
          sdk: org.freedesktop.Sdk
          command: game-${ARCH}
          finish-args:
            - --share=ipc
            - --socket=x11
            - --socket=wayland
            - --device=dri
            - --socket=pulseaudio
          modules:
            - name: game
              buildsystem: simple
              build-commands:
                - install -D game-${ARCH} /app/bin/game-${ARCH}
                - install -D -m 644 potato-256.png /app/share/icons/hicolor/256x256/apps/${APP_ID}.png
              sources:
                - type: file
                  path: dist/game-${ARCH}
                  dest-filename: game-${ARCH}
                - type: file
                  path: potato-256.png
                  dest-filename: potato-256.png
          FLATPAK_EOF
          
          flatpak-builder --user --repo=repo --force-clean build-dir ${APP_ID}.yml
          flatpak build-bundle repo dist/skakavi-krompir-alpha_${VERSION}_${ARCH}.flatpak ${APP_ID}

      - name: Upload artifact - Windows
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: game.exe
          path: dist/game.exe

      - name: Upload artifacts - Linux
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: skakavi-krompir-alpha-linux-packages-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            dist/game-*
            dist/skakavi-krompir-alpha_*.deb
            dist/skakavi-krompir-alpha_*.flatpak
